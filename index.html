<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clarity Systems - Vérifications</title>

<style>
  /* Ligne horizontale */
.row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  column-gap: 10px;
}

/* Bloc texte */
.left {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 1px;
  min-width: 0;
}
  
body {
  font-family: Arial, sans-serif;
  background: #f2f2f7;
  display: flex;
  justify-content: center;
  padding: 20px;
}

#app {
  background: #fff;
  width: 100%;
  max-width: 420px;
  height: 90vh;
  border-radius: 18px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  overflow: hidden;
}

header {
  padding: 16px;
  text-align: center;
  border-bottom: 1px solid #e0e0e0;
}

.logo {
  width: 220px;
}

.tabs {
  display: flex;
  border-bottom: 1px solid #eee;
}

.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  font-weight: 600;
}

.tab.active {
  color: #209DB5;
  border-bottom: 3px solid #209DB5;
}

#content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.item {
  background: #ffffff;
  padding: 4px 10px;
  border-radius: 16px;
  margin-bottom: 6px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.04);
}

.item:active {
  transform: scale(0.98);
}

/* Barre couleur plus fine */
.item.red {
  border-left: 3px solid #e74c3c;
}

.item.green {
  border-left: 3px solid #2ecc71;
}

/* Titre */
.item h3 {
  margin: 0;
  font-size: 14px;
  font-weight: 600;
  line-height: 1.15;
}

/* Date */
.item p {
  margin: 0;
  font-size: 11px;
  line-height: 1.1;
  color: #8e8e93;
}

/* Bouton ultra propre */
button {
  background: #209DB5;
  color: white;
  border: none;
  height: 30px;
  padding: 0 12px;
  border-radius: 9px;
  font-size: 12px;
  font-weight: 600;
  width: auto;
  min-width: 78px;
  flex-shrink: 0;
  cursor: pointer;
}

button:hover {
  background: #1b889c;
}

.empty {
  text-align: center;
  color: #777;
  margin-top: 40px;
  font-size: 13px;
}

.popup {
  position: fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background: rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
}

.popup-content {
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:80%;
  max-width:300px;
  text-align:center;
}

.popup-buttons {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.popup-buttons button {
  flex:1;
}
</style>
</head>

<body>

<div id="app">

<header>
<img src="https://i.imgur.com/1ZFTLIo.png" class="logo">
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('today', this)">Aujourd’hui</div>
  <div class="tab" onclick="switchTab('planning', this)">Planning</div>
</div>

<div id="content"></div>

</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <p>Confirmer la vérification ?</p>
    <div class="popup-buttons">
      <button onclick="closePopup()">Annuler</button>
      <button onclick="confirmValidation()">Confirmer</button>
    </div>
  </div>
</div>

<script>

const webhookGet = "https://hook.eu1.make.com/nef2xbgyv3xbgt5tdufuhlgmur8uo5om";
const webhookPost = "https://hook.eu1.make.com/8jn8w4ocie8mvwdoa23650iw9o3ngoyz";

let data = [];
let currentId = null;
let currentTab = "today";

// Chargement des données
async function loadData() {
  try {
    const res = await fetch(webhookGet);
    data = await res.json();
  } catch {
    data = [];
  }

  render();
  setTimeout(render, 50);
}

// Changement d’onglet
function switchTab(tab, el) {
  currentTab = tab;

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");

  render();
}

// Affichage
function render() {
  const content = document.getElementById("content");
  content.innerHTML = "";

  const today = new Date();
  today.setHours(0,0,0,0);

  if (currentTab === "today") {

    const items = data.filter(item => {
      const d = new Date(item.date);
      d.setHours(0,0,0,0);
      return d <= today;
    });

    if (items.length === 0) {
      content.innerHTML = `<div class="empty">✅ Rien à vérifier aujourd’hui</div>`;
      return;
    }

    items.forEach(item => {
      const d = new Date(item.date);
      d.setHours(0,0,0,0);
      const isLate = d < today;

      content.innerHTML += `
<div class="item ${isLate ? 'red' : 'green'}">
  <div class="row">
    <div class="left">
      <h3>${item.name}</h3>
      <p>${item.date}</p>
    </div>
    <button onclick="openPopup('${item.id}')">Valider</button>
  </div>
</div>`;
    });

  } else {

    const sorted = [...data].sort((a,b) => new Date(a.date) - new Date(b.date));

    sorted.forEach(item => {
      content.innerHTML += `
      <div class="item">
        <h3>${item.name}</h3>
        <p>${item.date}</p>
      </div>`;
    });

  }
}

// Popup
function openPopup(id) {
  currentId = id;
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// Validation
async function confirmValidation() {

  try {
    await fetch(webhookPost, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: currentId })
    });
  } catch {}

  closePopup();

  // message temporaire
  document.getElementById("content").innerHTML = `<div class="empty">✅ Vérification enregistrée</div>`;

  setTimeout(loadData, 800);
}

// Lancement propre
document.addEventListener("DOMContentLoaded", () => {
  loadData();
});

</script>

</body>
</html>
