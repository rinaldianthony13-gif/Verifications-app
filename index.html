<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clarity Systems - Vérifications</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background: #f2f2f7;
  display: flex;
  justify-content: center;
  padding: 16px;
  margin: 0;
}

#app {
  background: #fff;
  width: 100%;
  max-width: 420px;
  height: 92vh;
  border-radius: 24px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 50px rgba(0,0,0,0.12);
  overflow: hidden;
}

/* HEADER */
header {
  padding: 14px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

.logo {
  width: 200px;
}

/* TABS */
.tabs {
  display: flex;
  border-bottom: 1px solid #eee;
}

.tab {
  flex: 1;
  padding: 14px;
  text-align: center;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
}

.tab.active {
  color: #209DB5;
  border-bottom: 3px solid #209DB5;
}

/* CONTENT */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

/* CARD */
.item {
  background: #fff;
  border-radius: 16px;
  padding: 8px 12px;
  margin-bottom: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  position: relative;
}

/* COULEUR GAUCHE */
.item.red::before,
.item.green::before {
  content: "";
  position: absolute;
  left: 0;
  top: 8px;
  bottom: 8px;
  width: 3px;
  border-radius: 3px;
}

.item.red::before { background: #e74c3c; }
.item.green::before { background: #2ecc71; }

/* LIGNE */
.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* TEXTE */
.left {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.item h3 {
  margin: 0;
  font-size: 15px;
  font-weight: 600;
}

.item p {
  margin: 2px 0 0 0;
  font-size: 12px;
  color: #8e8e93;
}

/* BOUTON */
button {
  height: 34px;
  padding: 0 14px;
  background: #209DB5;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
}

/* EMPTY */
.empty {
  text-align: center;
  margin-top: 30px;
  color: #8e8e93;
  font-size: 14px;
}

/* POPUP */
.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  display: none;
  align-items: center;
  justify-content: center;
}

.popup-content {
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  width: 80%;
  max-width: 300px;
  text-align: center;
}

.popup-buttons {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.popup-buttons button {
  flex: 1;
}
</style>
</head>

<body>

<div id="app">

<header>
<img src="https://i.imgur.com/1ZFTLIo.png" class="logo">
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('today', this)">Aujourd’hui</div>
  <div class="tab" onclick="switchTab('planning', this)">Planning</div>
</div>

<div id="content"></div>

</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <p>Confirmer la vérification ?</p>
    <div class="popup-buttons">
      <button onclick="closePopup()">Annuler</button>
      <button onclick="confirmValidation()">Confirmer</button>
    </div>
  </div>
</div>

<script>

const webhookGet = "https://hook.eu1.make.com/nef2xbgyv3xbgt5tdufuhlgmur8uo5om";
const webhookPost = "https://hook.eu1.make.com/8jn8w4ocie8mvwdoa23650iw9o3ngoyz";

let data = [];
let currentId = null;
let currentTab = "today";

async function loadData() {
  try {
    const res = await fetch(webhookGet);
    data = await res.json();
  } catch {
    data = [];
  }

  render();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  render();
}

function render() {
  const content = document.getElementById("content");
  content.innerHTML = "";

  const today = new Date();
  today.setHours(0,0,0,0);

  if (currentTab === "today") {

    const items = data.filter(item => {
      const d = new Date(item.date);
      d.setHours(0,0,0,0);
      return d <= today;
    });

    if (items.length === 0) {
      content.innerHTML = `<div class="empty">✅ Rien à vérifier aujourd’hui</div>`;
      return;
    }

    items.forEach(item => {
      const d = new Date(item.date);
      d.setHours(0,0,0,0);
      const isLate = d < today;

      content.innerHTML += `
      <div class="item ${isLate ? 'red' : 'green'}">
        <div class="row">
          <div class="left">
            <h3>${item.name}</h3>
            <p>${item.date}</p>
          </div>
          <button onclick="openPopup('${item.id}')">Valider</button>
        </div>
      </div>`;
    });

  } else {

    const sorted = [...data].sort((a,b) => new Date(a.date) - new Date(b.date));

    sorted.forEach(item => {
      content.innerHTML += `
      <div class="item">
        <div class="row">
          <div class="left">
            <h3>${item.name}</h3>
            <p>${item.date}</p>
          </div>
        </div>
      </div>`;
    });

  }
}

function openPopup(id) {
  currentId = id;
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

async function confirmValidation() {
  try {
    await fetch(webhookPost, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: currentId })
    });
  } catch {}

  closePopup();
  loadData();
}

document.addEventListener("DOMContentLoaded", loadData);

</script>

</body>
</html>
